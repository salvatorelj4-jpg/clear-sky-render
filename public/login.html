<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><link rel="stylesheet" href="style.css"><title>Login - Bunker</title></head>
<body>
    <div class="container" style="max-width:350px; margin-top:100px;">
        <div class="card">
            <h2 style="color:var(--accent); text-align:center;">NÚCLEO CLEAR SKY</h2>
            <hr>
            <input type="text" id="u" placeholder="Usuário">
            <input type="password" id="p" placeholder="Senha">
            <button onclick="entrar()" style="margin-top:15px;">AUTENTICAR</button>
        </div>
    </div>
    <script>
        async function entrar() {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ usuario: document.getElementById('u').value, senha: document.getElementById('p').value })
            });
            if(res.ok) {
                const d = await res.json();
                localStorage.setItem('eco_token', d.token);
                localStorage.setItem('eco_role', d.role);
                window.location.href = 'stalkers.html';
            } else { alert("Acesso Negado."); }
        }
    </script>
</body>
</html>
