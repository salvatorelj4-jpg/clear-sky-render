<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Arquivo Científico</title>
</head>
<body onload="checkAuth(); carregarPesquisas()">
    <nav>
        <span style="color:var(--accent); font-weight:bold; margin-right:20px;">SISTEMA CLEAR SKY</span>
        <a href="dashboard.html">Painel</a> 
        <a href="stalkers.html">Stalkers</a> 
        <a href="itens.html">Comércio</a> 
        <a href="estoque.html">Estoque</a>
        <a href="enciclopedia.html" style="color:var(--accent);">Pesquisa</a> 
        <a href="relatorios.html">Relatórios</a> 
        <a href="historico.html">Histórico</a> 
        <a href="missoes.html">Missões</a>
        <a href="membros.html" id="navAdmin">Equipe</a> 
        <a onclick="logout()" style="color:#e74c3c; margin-left:auto;">Sair</a>
    </nav>

    <div class="container">
        <div class="card" style="border-top: 3px solid #f1c40f;">
            <h3 style="color:#f1c40f;">Catalogar Descoberta Científica</h3>
            <form id="formPesquisa" onsubmit="salvarPesquisa(event)">
                <input type="hidden" id="editPesquisaId">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="pTitulo" name="titulo" placeholder="Nome da Entidade (Ex: Artefato Medusa, Bloodsucker)" required style="flex:2">
                    <select id="pClass" name="classificacao" style="flex:1" required>
                        <option value="artefato">Artefato</option>
                        <option value="mutante">Mutante</option>
                        <option value="anomalia">Anomalia Espacial</option>
                        <option value="tecnologia">Tecnologia Experimental</option>
                    </select>
                </div>
                <textarea id="pDesc" name="descricao" placeholder="Descrição da anatomia, propriedades radiológicas, valor comercial, fraquezas..." style="height:120px;" required></textarea>
                
                <label style="color:#f1c40f; font-weight:bold; margin-top:5px; display:block;">Foto/Esquema do Arquivo (Opcional):</label>
                <input type="file" name="foto" style="margin-bottom:15px; border-color:#f1c40f;">

                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button type="submit" id="btnSalvarPesquisa" style="background:#f1c40f; color:#000;">ARQUIVAR DESCOBERTA</button>
                    <button type="button" id="btnCancelarPesquisa" onclick="cancelarEdicaoPesquisa()" style="background:#555; display:none;">Cancelar</button>
                </div>
            </form>
        </div>

        <h3 style="margin-top:30px; border-bottom:1px solid #333; padding-bottom:10px; color:#f1c40f;">Compêndio de Pesquisa de Yantar</h3>
        
        <div id="listaPesquisas"></div>
    </div>

    <div id="modalPerfil" class="modal-overlay" style="display:none;">
        <div class="modal-content" style="border-color: #f1c40f; box-shadow: 0 0 40px rgba(241, 196, 15, 0.2);">
            <span class="fechar-modal" onclick="document.getElementById('modalPerfil').style.display='none'">&times;</span>
            <div id="conteudoPerfil"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
