<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><link rel="stylesheet" href="style.css"><title>Comércio</title></head>
<body onload="checkAuth(); inicializarComercio()">
    <nav>
        <span style="color:var(--accent); font-weight:bold; margin-right:20px;">SISTEMA CLEAR SKY</span>
        <a href="dashboard.html">Painel</a> 
        <a href="stalkers.html">Stalkers</a> 
        <a href="itens.html" style="color:var(--accent);">Comércio</a> 
        <a href="estoque.html">Estoque</a>
        <a href="enciclopedia.html">Pesquisa</a> 
        <a href="relatorios.html">Relatórios</a> 
        <a href="historico.html">Histórico</a> 
        <a href="missoes.html">Missões</a>
        <a href="listanegra.html" style="color:#e74c3c; font-weight:bold;">Lista Negra</a>
        <a href="membros.html" id="navAdmin">Equipe</a> 
        <a onclick="logout()" style="color:#e74c3c; margin-left:auto;">Sair</a>
    </nav>
    <div class="container">

        <div id="btnEconomiaAdmin" style="display:none; margin-bottom: 15px; text-align:right;">
            <button onclick="abrirPainelEconomia()" style="background:#f39c12; width:auto; font-weight:bold; letter-spacing:1px; box-shadow: 0 0 10px #f39c12;">⚙️ AJUSTAR TAXAS DA ECONOMIA (ADMIN)</button>
        </div>

        <div style="display:flex; gap:20px; flex-wrap:wrap; align-items:flex-start;">
            
            <div class="card" style="flex:1; min-width:300px; border-top: 3px solid var(--accent);">
                <h3>Terminal de Comércio</h3>
                <label style="color:#aaa;">1. Identificação do Stalker:</label>
                <select id="selectStalker" onchange="atualizarInterfaceComercio()"></select>

                <div id="statusPiaget" style="display:none; padding:10px; border-left:4px solid; background:rgba(0,0,0,0.3); margin-bottom:15px;">
                    <strong id="labelNivel">Status: </strong><br>
                    <small>Permissão de Compra: <b id="itensLiberados"></b></small>
                </div>

                <label style="color:#aaa;">2. Adicionar Item ao Carrinho:</label>
                
                <input type="text" id="buscaComercioItem" placeholder="🔍 Buscar item pelo nome..." onkeyup="filtrarItensComercio()" style="width:100%; padding:10px; margin-bottom:10px; background:rgba(0,0,0,0.6); color:#fff; border:1px solid var(--border); border-radius:4px; box-sizing:border-box;">
                
                <select id="selectItem" style="width:100%; margin-bottom:15px; padding:10px; background:#222; color:#fff; border:1px solid #444; border-radius:4px; outline:none; cursor:pointer;"></select>
                
                <div style="display:flex; gap:10px; align-items:center; margin-bottom:15px;">
                    <label style="font-weight:bold;">Quantidade:</label>
                    <input type="number" id="qtdItem" value="1" min="1" style="width:80px; margin:0; font-size:1.1em; text-align:center;">
                    <button onclick="adicionarAoCarrinho()" style="flex:1; background:#3498db;">🛒 Adicionar Item</button>
                </div>
            </div>

            <div class="card" id="painelPagamento" style="flex:1; min-width:300px; display:none; border-top: 3px solid #f1c40f;">
                <h3 style="color:#f1c40f; margin-top:0;">📝 Carrinho da Transação</h3>
                
                <div id="carrinhoLista" style="background:rgba(0,0,0,0.5); padding:15px; min-height:100px; border-radius:4px; margin-bottom:15px; border: 1px solid #333;">
                </div>

                <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:1.1em;">
                    <span>Total se o Bunker VENDER (Ele Paga):</span>
                    <strong id="resCompra" style="color:#e74c3c; font-size:1.2em;">0 RU</strong>
                </div>
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-size:1.1em; border-bottom:1px solid #333; padding-bottom:10px;">
                    <span>Total se o Bunker COMPRAR (Ele Recebe):</span>
                    <strong id="resVenda" style="color:#2ecc71; font-size:1.2em;">0 RU</strong>
                </div>

                <label style="color:#aaa;">Método de Compensação:</label>
                <div style="display:flex; gap:15px; margin-bottom:10px; background:rgba(0,0,0,0.3); padding:10px; border-radius:4px;">
                    <label><input type="checkbox" id="pgRu" checked onchange="toggleInputsPagamento()"> Dinheiro (RU)</label>
                    <label><input type="checkbox" id="pgItem" onchange="toggleInputsPagamento()"> Escambo</label>
                    <label><input type="checkbox" id="pgRep" onchange="toggleInputsPagamento()"> Reputação</label>
                </div>

                <div id="divEscambo" style="display:none;"><input type="text" id="txtEscambo" placeholder="Qual item ele entregou em troca?"></div>
                <div id="divReputacao" style="display:none;"><input type="text" id="numReputacao" placeholder="Reputação Bônus (+/-)"></div>

                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button onclick="registrarTransacaoCarrinho('venda_bunker')" style="background:#e74c3c;">Bunker Vende (Cobrar)</button>
                    <button onclick="registrarTransacaoCarrinho('compra_bunker')" style="background:#2ecc71;">Bunker Compra (Pagar)</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modalPerfil" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <span class="fechar-modal" onclick="fecharPerfilStalker()">&times;</span>
            <div id="conteudoPerfil"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
